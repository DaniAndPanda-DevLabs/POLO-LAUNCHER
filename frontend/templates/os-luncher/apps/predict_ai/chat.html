<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="polo-launcher" content="true">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">

<title>Predict Ai chat</title>

<style>
:root{
    --bg:#0f1117;
    --panel:#171923;
    --card:rgba(255,255,255,0.05);
    --border:rgba(255,255,255,0.08);
    --accent:#4f8cff;
    --text:#ffffff;
    --sub:#9ca3af;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Pretendard',sans-serif;
}

body{
    background:
    radial-gradient(circle at top left,#1f2a44 0%,transparent 35%),
    radial-gradient(circle at bottom right,#1b4332 0%,transparent 35%),
    var(--bg);

    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:var(--text);
}

.chat-wrapper{
    width:min(1200px,95vw);
    height:92vh;

    backdrop-filter:blur(30px);

    background:rgba(20,22,30,0.75);
    border:1px solid var(--border);

    border-radius:28px;

    overflow:hidden;

    display:flex;

    box-shadow:
    0 20px 80px rgba(0,0,0,.45);
}

.sidebar{
    width:280px;
    background:rgba(255,255,255,0.03);
    border-right:1px solid var(--border);
    padding:20px;
}

.logo{
    font-size:22px;
    font-weight:700;
    margin-bottom:30px;
}

.new-chat{
    width:100%;
    border:none;
    background:var(--accent);
    color:white;
    padding:14px;
    border-radius:14px;
    cursor:pointer;
    font-weight:600;
}

.chat-area{
    flex:1;
    display:flex;
    flex-direction:column;
}

.header{
    height:72px;
    border-bottom:1px solid var(--border);

    display:flex;
    align-items:center;
    padding:0 28px;
}

.header h2{
    font-size:18px;
}

.messages{
    flex:1;
    overflow:auto;
    padding:30px;
}

.message{
    display:flex;
    margin-bottom:24px;
    animation:fade .3s ease;
}

.user{
    justify-content:flex-end;
}

.ai{
    justify-content:flex-start;
}

.bubble{
    max-width:720px;
    padding:16px 20px;
    border-radius:20px;
    line-height:1.7;
}

.user .bubble{
    background:linear-gradient(
        135deg,
        #4f8cff,
        #7c5cff
    );
}

.ai .bubble{
    background:var(--card);
    border:1px solid var(--border);
    backdrop-filter:blur(20px);
}

.input-wrap{
    padding:24px;
}

.input-box{
    display:flex;
    align-items:center;
    gap:12px;

    background:rgba(255,255,255,.04);
    border:1px solid var(--border);

    border-radius:24px;
    padding:10px;
}

textarea{
    flex:1;
    background:none;
    border:none;
    resize:none;
    color:white;
    outline:none;
    font-size:15px;
    padding:10px;
}

.send{
    width:50px;
    height:50px;
    border:none;
    border-radius:16px;
    background:var(--accent);
    color:white;
    cursor:pointer;
    font-size:18px;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:none;
    }
}
</style>
</head>
<body>

<div class="chat-wrapper">

    <aside class="sidebar">
        <div class="logo">✦ AI Assistant</div>

        <button class="new-chat">
            + 새 대화
        </button>
    </aside>

    <main class="chat-area">

        <div class="header">
            <h2>GPT-5.5</h2>
        </div>

        <div class="messages">

            <div class="message ai">
                <div class="bubble">
                    안녕하세요 👋<br>
                    무엇을 도와드릴까요?
                </div>
            </div>

            <div class="message user">
                <div class="bubble">
                    현대적인 채팅 UI 만들어줘
                </div>
            </div>

            <div class="message ai">
                <div class="bubble">
                    최신 SaaS 스타일과 ChatGPT 디자인을
                    참고하여 제작했습니다.
                </div>
            </div>

        </div>

        <div class="input-wrap">
            <div class="input-box">
                <textarea
                    rows="1"
                    placeholder="메시지를 입력하세요..."
                ></textarea>

                <button class="send">
                    ↑
                </button>
            </div>
        </div>

    </main>

</div>

</body>
</html>
