<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인피니티 병합 타이쿤 : 하이퍼 16 (8x8)</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #111113;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 15px;
            height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            margin: 5px 0 10px 0;
            color: #ffcc00;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.6);
            font-size: 1.8rem;
        }

        /* 메인 게임 레이아웃: 사이드바 + 보드 */
        .game-container {
            display: flex;
            gap: 20px;
            width: 1000px;
            height: calc(100vh - 120px);
            align-items: flex-start;
        }

        /* 좌측 업그레이드 사이드바 (스크롤 가능) */
        .sidebar {
            width: 380px;
            background: #1b1b24;
            border-radius: 10px;
            padding: 15px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 8px;
            height: 100%;
            overflow-y: auto;
            box-sizing: border-box;
        }

        /* 스크롤바 커스텀 */
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: #3a86ff; border-radius: 3px; }

        /* 우측 콘텐츠 영역 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .stat-panel {
            display: flex;
            gap: 15px;
            font-size: 1.1rem;
            background: #1b1b24;
            padding: 12px 20px;
            border-radius: 8px;
            width: 100%;
            justify-content: space-around;
            box-sizing: border-box;
        }

        .coin-txt { color: #ffd700; font-weight: bold; }
        .buff-txt { color: #00ffcc; font-weight: bold; }

        .btn {
            background: #3a86ff;
            color: white;
            border: none;
            padding: 10px 12px;
            font-size: 0.85rem;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.15s;
            text-align: left;
            line-height: 1.4;
            width: 100%;
            box-sizing: border-box;
        }
        .btn:hover { background: #2a75e6; transform: translateY(-1px); }
        .btn:disabled { background: #444; color: #888; cursor: not-allowed; transform: none; }
        
        .btn.sell-zone { 
            background: #ff0055; 
            text-align: center; 
            font-size: 1.1rem;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
            padding: 20px;
            width: 100%;
        }
        .btn.sell-zone:hover { background: #e0004c; }

        /* 8x8 축소 게임 보드 */
        .board {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            grid-template-rows: repeat(8, 60px);
            gap: 6px;
            background-color: #20202a;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }

        .cell {
            background-color: rgba(255, 255, 255, 0.03);
            border-radius: 5px;
            width: 60px;
            height: 60px;
            position: relative;
        }

        /* 아이템 블록 */
        .item {
            width: 100%;
            height: 100%;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            color: #fff;
            cursor: grab;
            user-select: none;
            position: absolute;
            top: 0;
            left: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
            text-shadow: 1px 1px 2px #000;
        }
        .item:active { cursor: grabbing; transform: scale(0.95); }
        
        .crit {
            animation: pulse 0.5s infinite alternate;
            border: 2px solid #fff;
        }
        @keyframes pulse {
            from { box-shadow: 0 0 5px #fff; }
            to { box-shadow: 0 0 15px #ffd700; }
        }

        /* 조커 특수 스타일 */
        .joker-wild { background: linear-gradient(45deg, #ff00af, #7a00ff) !important; animation: jglow 0.6s infinite alternate; border: 2px dashed #fff; }
        .joker-bomb { background: linear-gradient(45deg, #333333, #000000) !important; animation: bglow 0.3s infinite alternate; border: 2px solid #ff3300; color: #ff3300 !important; }
        .joker-clone { background: linear-gradient(45deg, #00f0ff, #00ff77) !important; animation: cglow 0.6s infinite alternate; border: 2px dotted #fff; color: #000 !important; }

        @keyframes jglow { from { box-shadow: 0 0 4px #ff00af; } to { box-shadow: 0 0 12px #7a00ff; } }
        @keyframes bglow { from { box-shadow: 0 0 4px #000; } to { box-shadow: 0 0 12px #ff3300; } }
        @keyframes cglow { from { box-shadow: 0 0 4px #00f0ff; } to { box-shadow: 0 0 12px #00ff77; } }

        .instructions {
            font-size: 0.8rem;
            color: #aaa;
            text-align: center;
            line-height: 1.4;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <h1>🌌 인피니티 병합 타이쿤 : 하이퍼 16 🌌</h1>
    
    <div class="game-container">
        <div class="sidebar" id="sidebar">
            <button id="up-lvl-btn" class="btn" onclick="upgradeSpawnLevel()"></button>
            <button id="up-mult-btn" class="btn" onclick="upgradeMultiplier()"></button>
            <button id="up-crit-btn" class="btn" onclick="upgradeCritical()"></button>
            <button id="up-auto-btn" class="btn" onclick="upgradeAutoSeller()"></button>
            <button id="up-speed-btn" class="btn" onclick="upgradeSpawnSpeed()"></button>
            <button id="up-joker-btn" class="btn" onclick="upgradeJokerChance()"></button>
            <button id="up-basevalue-btn" class="btn" onclick="upgradeBaseValue()"></button>
            <button id="up-discount-btn" class="btn" onclick="upgradeDiscount()"></button>
            
            <button id="up-mergebonus-btn" class="btn" onclick="upgradeMergeBonus()"></button>
            <button id="up-bomb-btn" class="btn" onclick="upgradeBombRange()"></button>
            <button id="up-double-btn" class="btn" onclick="upgradeDoubleSpawn()"></button>
            <button id="up-interest-btn" class="btn" onclick="upgradeInterest()"></button>
            <button id="up-critmult-btn" class="btn" onclick="upgradeCritMult()"></button>
            <button id="up-lucky-btn" class="btn" onclick="upgradeLuckyJoker()"></button>
            <button id="up-offline-btn" class="btn" onclick="upgradePassiveCoin()"></button>
            <button id="up-rebirth-btn" class="btn" onclick="upgradeHyperMult()"></button>
        </div>

        <div class="main-content">
            <div class="stat-panel">
                <div>코인: <span id="coin-display" class="coin-txt">0</span></div>
                <div>스폰 속도: <span id="speed-display" class="buff-txt">1.0초</span></div>
                <div>자동판매: <span id="auto-display" style="color:#ff5500;">OFF</span></div>
            </div>

            <div class="board" id="board"></div>
            
            <div class="btn sell-zone" id="sell-zone">🔥여기에 드롭하여 판매 (배율 및 특성 반영)🔥</div>
            
            <div class="instructions">
                <strong>[사이드바 스크롤 가능]</strong> 판이 8x8로 밀집되었습니다. 자동 청소기와 폭탄 범위를 업그레이드해 정체를 막으세요!<br>
                레벨 제한은 완전히 존재하지 않으며 가용 자산은 알파벳 단위로 무한 확장됩니다.
            </div>
        </div>
    </div>

    <script>
        function logAppEvent(message) {
            const timestamp = new Date().toISOString();
            fetch(`http://localhost:6766/logwrite/?writedata=${encodeURIComponent(`[${timestamp}] ${message}`)}`);
        }

        logAppEvent('game_page_loaded');
        let coins = 0n; 
        
        // --- 16개 업그레이드 변수 시스템 ---
        let baseSpawnLevel = 1;         // 1. 기본 스폰 레벨
        let sellMultiplier = 1n;        // 2. 판매 배율 효율
        let critChance = 0;             // 3. 크리티컬 스폰 확률 (%)
        let autoSellerLevel = 0;        // 4. 자동 판매기 레벨
        let spawnSpeedLevel = 0;        // 5. 블록 스폰 속도 레벨
        let jokerChanceLevel = 0;       // 6. 특수 조커 스폰 확률 레벨
        let baseValueBonus = 0n;        // 7. 판매 기본 보너스
        let discountLevel = 0;          // 8. 기술 개발 (할인율 레벨)
        
        // 신규 8종 스탯
        let mergeBonusLevel = 0;        // 9. 병합 시 코인 보너스 레벨
        let bombRangeLevel = 0;         // 10. 폭탄 화력 폭발 범위 가산 (0=주변1칸, 1=십자2칸 등)
        let doubleSpawnChance = 0;      // 11. 2개 동시 스폰 확률 (%)
        let interestLevel = 0;          // 12. 주기적 이자 지급 레벨
        let critMultiplier = 2n;        // 13. 크리티컬 스폰 시 레벨 보너스 가중치
        let luckyJokerType = 0;         // 14. 조커 획득 효율 등급
        let passiveCoinLevel = 0;       // 15. 유휴 자동 자원 수급처
        let hyperMultLevel = 1n;        // 16. 하이퍼 차원 증폭기 배율

        // 기본 비용 데이터 구조화
        let lvlCost = 150n;      let multCost = 200n;      let critCost = 300n;      let autoCost = 1000n;
        let speedCost = 500n;    let jokerCost = 800n;     let basevalueCost = 1500n; let discountCost = 2000n;
        let mergeCost = 2500n;   let bombCost = 4000n;     let doubleCost = 5000n;   let interestCost = 7000n;
        let critmultCost = 9000n; let luckyCost = 12000n;  let passiveCost = 15000n; let rebirthCost = 50000n;
        
        const boardSize = 64; // 8x8 너프
        const board = document.getElementById('board');
        let draggedElement = null;
        let spawnIntervalId = null;

        // 알파벳 화폐단위 생성기
        const units = ["", "K", "M", "B", "T"];
        function initUnits() {
            for (let i = 0; i < 26; i++) {
                for (let j = 0; j < 26; j++) {
                    units.push(String.fromCharCode(65 + i) + String.fromCharCode(65 + j));
                }
            }
        }
        initUnits();

        function formatNumber(bigintNum) {
            if (bigintNum === 0n) return "0";
            let str = bigintNum.toString();
            let len = str.length;
            if (len <= 3) return str;
            let unitIndex = Math.floor((len - 1) / 3);
            if (unitIndex >= units.length) return "Infinity";
            let r = len % 3; if (r === 0) r = 3;
            let integerPart = str.slice(0, r);
            let decimalPart = str.slice(r, r + 2);
            if (parseInt(decimalPart) === 0) return integerPart + " " + units[unitIndex];
            return integerPart + "." + decimalPart + " " + units[unitIndex];
        }

        function getLevelColor(lvl) {
            const hue = (lvl * 27) % 360;
            return `hsl(${hue}, 85%, 45%)`;
        }

        // 8번 할인 메커니즘
        function getDiscountedCost(baseCost) {
            let discountPercent = Math.min(discountLevel * 4, 80); // 최대 80% 할인
            return (baseCost * BigInt(100 - discountPercent)) / 100n;
        }

        function initBoard() {
            board.innerHTML = '';
            for (let i = 0; i < boardSize; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.index = i;
                cell.addEventListener('dragover', (e) => e.preventDefault());
                cell.addEventListener('drop', dropOnCell);
                board.appendChild(cell);
            }
        }

        function spawnBlock() {
            // 11번 업그레이드 효과: 더블 스폰 멀티플렉싱
            let spawns = 1;
            if (Math.random() * 100 < doubleSpawnChance) spawns = 2;

            for(let k=0; k<spawns; k++) {
                const emptyCells = [];
                document.querySelectorAll('.cell').forEach(cell => {
                    if (!cell.hasChildNodes()) emptyCells.push(cell);
                });

                if (emptyCells.length === 0) break;
                const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                const rand = Math.random() * 100;
                
                // 6번 & 14번 효과 적용 조커확률 계산
                let jokerBonus = (luckyJokerType * 0.8);
                let baseJokerChance = 1.2 + (jokerChanceLevel * 0.4) + jokerBonus;
                
                if (rand < baseJokerChance) {
                    createJoker(randomCell, 'wild', 'JOKER');
                } else if (rand < baseJokerChance * 2.0) {
                    createJoker(randomCell, 'bomb', '💣');
                } else if (rand < baseJokerChance * 3.0) {
                    createJoker(randomCell, 'clone', '🧬');
                } else {
                    let finalLvl = baseSpawnLevel;
                    let isCrit = false;
                    if (Math.random() * 100 < critChance) {
                        // 13번 크리 배율 가산 반영
                        finalLvl = baseSpawnLevel + Math.floor(Math.random() * 2) + parseInt(critMultiplier);
                        isCrit = true;
                    }
                    createBlock(randomCell, finalLvl, isCrit);
                }
            }
        }

        function createBlock(cell, lvl, isCrit = false) {
            const item = document.createElement('div');
            item.classList.add('item');
            if (isCrit) item.classList.add('crit');
            item.draggable = true;
            item.innerText = lvl;
            item.dataset.level = lvl;
            item.dataset.type = 'normal';
            item.style.backgroundColor = getLevelColor(lvl);
            setupDragEvents(item);
            cell.appendChild(item);
        }

        function createJoker(cell, jokerType, text) {
            const item = document.createElement('div');
            item.classList.add('item', `joker-${jokerType}`);
            item.draggable = true;
            item.innerText = text;
            item.dataset.type = jokerType;
            setupDragEvents(item);
            cell.appendChild(item);
        }

        function setupDragEvents(item) {
            item.addEventListener('dragstart', function() {
                draggedElement = this;
                setTimeout(() => this.style.opacity = '0.4', 0);
            });
            item.addEventListener('dragend', function() { this.style.opacity = '1'; });
        }

        function dropOnCell(e) {
            e.preventDefault();
            const targetCell = this;
            const sourceCell = draggedElement.parentElement;

            if (targetCell === sourceCell) return;
            const typeA = draggedElement.dataset.type;

            if (!targetCell.hasChildNodes()) {
                targetCell.appendChild(draggedElement);
                return;
            }

            const targetBlock = targetCell.firstElementChild;
            const typeB = targetBlock.dataset.type;
            
            if (typeB !== 'normal' && typeA === 'normal') {
                sourceCell.appendChild(targetBlock);
                targetCell.appendChild(draggedElement);
                return;
            }

            const lvlB = parseInt(targetBlock.dataset.level);

            if (typeA === 'bomb') {
                explodeBomb(parseInt(targetCell.dataset.index));
                draggedElement.remove();
                return;
            }

            if (typeA === 'clone') {
                sourceCell.innerHTML = '';
                createBlock(targetCell, lvlB);
                return;
            }

            if (typeA === 'wild') {
                targetCell.removeChild(targetBlock);
                sourceCell.innerHTML = '';
                createBlock(targetCell, lvlB + 1);
                triggerMergeReward(lvlB + 1);
                return;
            }

            if (typeA === 'normal' && typeB === 'normal') {
                const lvlA = parseInt(draggedElement.dataset.level);
                if (lvlA === lvlB) {
                    targetCell.removeChild(targetBlock);
                    sourceCell.innerHTML = '';
                    createBlock(targetCell, lvlA + 1);
                    triggerMergeReward(lvlA + 1); // 병합 시 추가금 지급
                } else {
                    sourceCell.appendChild(targetBlock);
                    targetCell.appendChild(draggedElement);
                }
            }
        }

        // 9번 업그레이드: 병합 보너스 트리거
        function triggerMergeReward(mergedLvl) {
            if (mergeBonusLevel > 0) {
                let reward = BigInt(mergedLvl * mergeBonusLevel * 15) * hyperMultLevel;
                coins += reward;
                updateUI();
            }
        }

        // 10번 업그레이드 반영 폭탄 강화 스플래시 연산
        function explodeBomb(centerIdx) {
            const cx = centerIdx % 8;
            const cy = Math.floor(centerIdx / 8);
            // 기본 범위 1칸 + 업그레이드로 가반 반경 증가
            let range = 1 + bombRangeLevel; 

            document.querySelectorAll('.cell').forEach(cell => {
                const idx = parseInt(cell.dataset.index);
                if (Math.abs(cx - (idx % 8)) <= range && Math.abs(cy - Math.floor(idx / 8)) <= range) {
                    if (cell.hasChildNodes()) {
                        const item = cell.firstElementChild;
                        if (item.dataset.type === 'normal') {
                            let lvl = BigInt(item.dataset.level);
                            coins += ((3n ** lvl) + baseValueBonus) * sellMultiplier * hyperMultLevel;
                        }
                        item.remove();
                    }
                }
            });
            updateUI();
        }

        const sellZone = document.getElementById('sell-zone');
        sellZone.addEventListener('dragover', (e) => e.preventDefault());
        sellZone.addEventListener('drop', function(e) {
            e.preventDefault();
            if (draggedElement) {
                if (draggedElement.dataset.type === 'normal') {
                    sellItem(draggedElement);
                } else {
                    draggedElement.remove();
                }
                draggedElement = null;
            }
        });

        function sellItem(itemElement) {
            const lvl = BigInt(itemElement.dataset.level);
            // 16번 최종 변수 차원 증폭 배율까지 곱연산 처리
            coins += ((3n ** lvl) + baseValueBonus) * sellMultiplier * hyperMultLevel;
            itemElement.remove();
            updateUI();
        }

        function runAutoSeller() {
            if (autoSellerLevel === 0) return;
            for (let i = 0; i < autoSellerLevel; i++) {
                let lowestLvl = Infinity; let lowestTarget = null;
                document.querySelectorAll('.item').forEach(item => {
                    if(item.dataset.type === 'normal') {
                        const lvl = parseInt(item.dataset.level);
                        if (lvl < lowestLvl) { lowestLvl = lvl; lowestTarget = item; }
                    }
                });
                if (lowestTarget) sellItem(lowestTarget);
                else break;
            }
        }

        function updateSpawnSpeedTimer() {
            if (spawnIntervalId) clearInterval(spawnIntervalId);
            let currentInterval = Math.max(50, 1000 - (spawnSpeedLevel * 70));
            document.getElementById('speed-display').innerText = (currentInterval / 1000).toFixed(2) + "초";
            spawnIntervalId = setInterval(spawnBlock, currentInterval);
        }

        // 12번 효과: 은행 이자 실시간 연산
        setInterval(() => {
            if (interestLevel > 0 && coins > 0n) {
                let interest = coins / BigInt(200 - Math.min(interestLevel * 5, 150));
                if (interest > 0n) {
                    coins += interest;
                    updateUI();
                }
            }
        }, 4000);

        // 15번 효과: 방치형 코인 생산라인
        setInterval(() => {
            if (passiveCoinLevel > 0) {
                coins += BigInt(passiveCoinLevel * 35) * hyperMultLevel;
                updateUI();
            }
        }, 1500);

        function updateUI() {
            document.getElementById('coin-display').innerText = formatNumber(coins);
            document.getElementById('auto-display').innerText = autoSellerLevel > 0 ? `Lv.${autoSellerLevel}` : "OFF";

            // 전방위 할인 단가 적용
            let cLvl = getDiscountedCost(lvlCost); let cMult = getDiscountedCost(multCost);
            let cCrit = getDiscountedCost(critCost); let cAuto = getDiscountedCost(autoCost);
            let cSpeed = getDiscountedCost(speedCost); let cJoker = getDiscountedCost(jokerCost);
            let cBase = getDiscountedCost(basevalueCost); let cDisc = getDiscountedCost(discountCost);
            let cMerge = getDiscountedCost(mergeCost); let cBomb = getDiscountedCost(bombCost);
            let cDouble = getDiscountedCost(doubleCost); let cInter = getDiscountedCost(interestCost);
            let cCmult = getDiscountedCost(critmultCost); let cLucky = getDiscountedCost(luckyCost);
            let cPass = getDiscountedCost(passiveCost); let cRebirth = getDiscountedCost(rebirthCost);

            // UI 내용 밀어넣기
            document.getElementById('up-lvl-btn').innerHTML = `🔺 1. 기본 레벨 업 (Lv.${baseSpawnLevel})<br><span>비용: ${formatNumber(cLvl)}</span>`;
            document.getElementById('up-lvl-btn').disabled = coins < cLvl;

            document.getElementById('up-mult-btn').innerHTML = `💰 2. 판매 배율 강화 (x${sellMultiplier})<br><span>비용: ${formatNumber(cMult)}</span>`;
            document.getElementById('up-mult-btn').disabled = coins < cMult;

            const upCritBtn = document.getElementById('up-crit-btn');
            if(critChance>=80){ upCritBtn.innerHTML=`🎲 3. 크리 확률 (MAX 80%)<br><span>최대치 달성</span>`; upCritBtn.disabled=true; }
            else { upCritBtn.innerHTML=`🎲 3. 크리 스폰 확률 (${critChance}%)<br><span>비용: ${formatNumber(cCrit)}</span>`; upCritBtn.disabled = coins < cCrit;}

            document.getElementById('up-auto-btn').innerHTML = `🎒 4. 자동 청소 속도 (Lv.${autoSellerLevel})<br><span>비용: ${formatNumber(cAuto)}</span>`;
            document.getElementById('up-auto-btn').disabled = coins < cAuto;

            document.getElementById('up-speed-btn').innerHTML = `⚡ 5. 블록 생산 가속 (Lv.${spawnSpeedLevel})<br><span>비용: ${formatNumber(cSpeed)}</span>`;
            document.getElementById('up-speed-btn').disabled = coins < cSpeed;

            const upJokerBtn = document.getElementById('up-joker-btn');
            if(jokerChanceLevel>=20){ upJokerBtn.innerHTML=`🔮 6. 조커 출현율 (MAX)<br><span>최대치 달성</span>`; upJokerBtn.disabled=true; }
            else { upJokerBtn.innerHTML = `🔮 6. 조커 출현율 (Lv.${jokerChanceLevel})<br><span>비용: ${formatNumber(cJoker)}</span>`; upJokerBtn.disabled = coins < cJoker; }

            document.getElementById('up-basevalue-btn').innerHTML = `🔥 7. 판매 기본금 추가 (+${formatNumber(baseValueBonus)})<br><span>비용: ${formatNumber(cBase)}</span>`;
            document.getElementById('up-basevalue-btn').disabled = coins < cBase;

            const upDiscBtn = document.getElementById('up-discount-btn');
            if(discountLevel>=20){ upDiscBtn.innerHTML=`📉 8. 기술 개발 (MAX 80%)<br><span>최대치 달성</span>`; upDiscBtn.disabled=true; }
            else { upDiscBtn.innerHTML = `📉 8. 기술 개발 (할인 ${discountLevel*4}%)<br><span>비용: ${formatNumber(cDisc)}</span>`; upDiscBtn.disabled = coins < cDisc; }

            // 신규 8종 상점 인터페이스 바인딩
            document.getElementById('up-mergebonus-btn').innerHTML = `✨ 9. 융합 장려금 (Lv.${mergeBonusLevel})<br><span>비용: ${formatNumber(cMerge)}</span>`;
            document.getElementById('up-mergebonus-btn').disabled = coins < cMerge;

            document.getElementById('up-bomb-btn').innerHTML = `💣 10. 폭탄 반경 증폭 (Lv.${bombRangeLevel})<br><span>비용: ${formatNumber(cBomb)}</span>`;
            document.getElementById('up-bomb-btn').disabled = coins < cBomb;

            const upDbBtn = document.getElementById('up-double-btn');
            if(doubleSpawnChance>=60){ upDbBtn.innerHTML=`🌀 11. 더블 스폰 (MAX 60%)<br><span>최대치 달성</span>`; upDbBtn.disabled=true; }
            else { upDbBtn.innerHTML = `🌀 11. 더블 스폰 확률 (${doubleSpawnChance}%)<br><span>비용: ${formatNumber(cDouble)}</span>`; upDbBtn.disabled = coins < cDouble; }

            document.getElementById('up-interest-btn').innerHTML = `🏦 12. 금융 복리 자산 (Lv.${interestLevel})<br><span>비용: ${formatNumber(cInter)}</span>`;
            document.getElementById('up-interest-btn').disabled = coins < cInter;

            document.getElementById('up-critmult-btn').innerHTML = `🎯 13. 크리 등급 진화 (+${critMultiplier} Lv)<br><span>비용: ${formatNumber(cCmult)}</span>`;
            document.getElementById('up-critmult-btn').disabled = coins < cCmult;

            document.getElementById('up-lucky-btn').innerHTML = `🃏 14. 럭키 행운의 조커 (Lv.${luckyJokerType})<br><span>비용: ${formatNumber(cLucky)}</span>`;
            document.getElementById('up-lucky-btn').disabled = coins < cLucky;

            document.getElementById('up-offline-btn').innerHTML = `🏭 15. 자동화 공장 수급 (Lv.${passiveCoinLevel})<br><span>비용: ${formatNumber(cPass)}</span>`;
            document.getElementById('up-offline-btn').disabled = coins < cPass;

            document.getElementById('up-rebirth-btn').innerHTML = `🌌 16. 하이퍼 차원 배율 (x${hyperMultLevel})<br><span>비용: ${formatNumber(cRebirth)}</span>`;
            document.getElementById('up-rebirth-btn').disabled = coins < cRebirth;
        }

        // --- 호출 제어 본문 함수 그룹 ---
        function upgradeSpawnLevel() { let c = getDiscountedCost(lvlCost); if (coins >= c) { coins -= c; baseSpawnLevel++; lvlCost = (lvlCost * 22n) / 10n; updateUI(); } }
        function upgradeMultiplier() { let c = getDiscountedCost(multCost); if (coins >= c) { coins -= c; sellMultiplier += 1n; multCost = (multCost * 25n) / 10n; updateUI(); } }
        function upgradeCritical() { let c = getDiscountedCost(critCost); if (coins >= c && critChance < 80) { coins -= c; critChance += 5; critCost = (critCost * 30n) / 10n; updateUI(); } }
        function upgradeAutoSeller() { let c = getDiscountedCost(autoCost); if (coins >= c) { coins -= c; autoSellerLevel++; autoCost = (autoCost * 33n) / 10n; updateUI(); } }
        function upgradeSpawnSpeed() { let c = getDiscountedCost(speedCost); if (coins >= c) { coins -= c; spawnSpeedLevel++; speedCost = (speedCost * 26n) / 10n; updateSpawnSpeedTimer(); updateUI(); } }
        function upgradeJokerChance() { let c = getDiscountedCost(jokerCost); if (coins >= c && jokerChanceLevel < 20) { coins -= c; jokerChanceLevel++; jokerCost = (jokerCost * 38n) / 10n; updateUI(); } }
        function upgradeBaseValue() { let c = getDiscountedCost(basevalueCost); if (coins >= c) { coins -= c; baseValueBonus = baseValueBonus === 0n ? 60n : baseValueBonus * 3n; basevalueCost = (basevalueCost * 28n) / 10n; updateUI(); } }
        function upgradeDiscount() { let c = getDiscountedCost(discountCost); if (coins >= c && discountLevel < 20) { coins -= c; discountLevel++; discountCost = (discountCost * 42n) / 10n; updateUI(); } }
        
        // 신규 8종 기능 핸들러
        function upgradeMergeBonus() { let c = getDiscountedCost(mergeCost); if (coins >= c) { coins -= c; mergeBonusLevel++; mergeCost = (mergeCost * 26n) / 10n; updateUI(); } }
        function upgradeBombRange() { let c = getDiscountedCost(bombCost); if (coins >= c) { coins -= c; bombRangeLevel++; bombCost = (bombCost * 40n) / 10n; updateUI(); } }
        function upgradeDoubleSpawn() { let c = getDiscountedCost(doubleCost); if (coins >= c && doubleSpawnChance < 60) { coins -= c; doubleSpawnChance += 4; doubleCost = (doubleCost * 32n) / 10n; updateUI(); } }
        function upgradeInterest() { let c = getDiscountedCost(interestCost); if (coins >= c) { coins -= c; interestLevel++; interestCost = (interestCost * 35n) / 10n; updateUI(); } }
        function upgradeCritMult() { let c = getDiscountedCost(critmultCost); if (coins >= c) { coins -= c; critMultiplier += 1n; critmultCost = (critmultCost * 30n) / 10n; updateUI(); } }
        function upgradeLuckyJoker() { let c = getDiscountedCost(luckyCost); if (coins >= c) { coins -= c; luckyJokerType++; luckyCost = (luckyCost * 36n) / 10n; updateUI(); } }
        function upgradePassiveCoin() { let c = getDiscountedCost(passiveCost); if (coins >= c) { coins -= c; passiveCoinLevel++; passiveCost = (passiveCost * 25n) / 10n; updateUI(); } }
        function upgradeHyperMult() { let c = getDiscountedCost(rebirthCost); if (coins >= c) { coins -= c; hyperMultLevel *= 2n; rebirthCost = (rebirthCost * 50n) / 10n; updateUI(); } }

        // 시스템 루틴 초기 구동
        initBoard();
        updateSpawnSpeedTimer();
        setInterval(runAutoSeller, 2500);
        updateUI();
    </script>
</body>
</html>
