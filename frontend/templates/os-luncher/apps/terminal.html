<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Terminal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0d1117;
    color:#00ff66;
    font-family:Consolas,monospace;
    overflow:hidden;
}

#terminal{
    width:100vw;
    height:100vh;
    padding:20px;
    overflow-y:auto;
}

.line{
    display:flex;
    align-items:center;
    white-space:pre-wrap;
    word-break:break-word;
}

.prompt{
    color:#00ff66;
    margin-right:8px;
    user-select:none;
}

input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:white;
    font:inherit;
}

.output{
    margin:2px 0 8px 0;
    color:#d2ffd2;
}

::-webkit-scrollbar{
    width:8px;
}
::-webkit-scrollbar-thumb{
    background:#00ff66;
}

.cursor{
    animation:blink .8s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

.welcome{
    color:#7dffb3;
    margin-bottom:20px;
}
</style>
</head>
<body>

<div id="terminal">

<div class="welcome">
Web Terminal v1.0

help 를 입력하여 명령어를 확인하세요.
</div>

</div>

<script>

const terminal=document.getElementById("terminal");

const history=[];
let historyIndex=0;

function newPrompt(){

    const line=document.createElement("div");
    line.className="line";

    const prompt=document.createElement("span");
    prompt.className="prompt";
    prompt.textContent="guest@web:~$";

    const input=document.createElement("input");

    line.appendChild(prompt);
    line.appendChild(input);

    terminal.appendChild(line);

    input.focus();

    terminal.scrollTop=terminal.scrollHeight;

    input.addEventListener("keydown",function(e){

        if(e.key==="Enter"){

            const cmd=input.value.trim();

            history.push(cmd);
            historyIndex=history.length;

            input.disabled=true;

            execute(cmd);

            newPrompt();
        }

        if(e.key==="ArrowUp"){

            if(historyIndex>0){
                historyIndex--;
                input.value=history[historyIndex];
            }

            e.preventDefault();
        }

        if(e.key==="ArrowDown"){

            if(historyIndex<history.length-1){
                historyIndex++;
                input.value=history[historyIndex];
            }else{
                historyIndex=history.length;
                input.value="";
            }

            e.preventDefault();
        }

    });

}

function print(text){

    const div=document.createElement("div");
    div.className="output";
    div.innerHTML=text.replace(/\n/g,"<br>");

    terminal.appendChild(div);
    terminal.scrollTop=terminal.scrollHeight;

}

function execute(cmd){

    if(cmd===""){
        return;
    }

    const args=cmd.split(" ");

    switch(args[0]){

        case "help":

            print(`
<b>사용 가능한 명령어</b>

help
clear
date
echo
calc
about
`);

        break;

        case "clear":

            terminal.innerHTML="";
            return;

        case "date":

            print(new Date().toString());

        break;

        case "echo":

            print(args.slice(1).join(" "));

        break;

        case "calc":

            try{
                let result=eval(args.slice(1).join(" "));
                print(result);
            }catch{
                print("계산 오류");
            }

        break;

        case "about":

            print(`
Web Terminal
HTML + CSS + JavaScript
Version 1.0
`);

        break;

        default:

            print(`command not found: ${cmd}`);

    }

}

newPrompt();

document.addEventListener("click",()=>{
    document.querySelector("input:last-child")?.focus();
});

</script>

</body>
</html>
