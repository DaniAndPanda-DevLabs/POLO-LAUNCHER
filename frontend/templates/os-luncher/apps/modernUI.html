<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            .parent {
                position: relative;
            }
            .box {
                display: flex;
                flex-wrap: wrap;
                align-content: flex-start;
                gap: 12px;
                padding: 12px;
                width: 1900px;
                height: auto;
                min-height: 950px;
                background-color: rgb(11, 39, 90);
                border-radius: 20px;
                margin: 0 auto;
                transition: all 0.27s;
                box-sizing: border-box;
            }
            .inner-box {
                width: calc((100% - 36px - 24px) / 4); 
                height: 200px;
                background-color: #3498db;
                color: white;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 20px;
                transition: all 0.3s;
                padding: 20px;
                box-sizing: border-box;
                font-size: 2.6rem;
                font-weight: 800;
            }
            .box:hover {
                background-color: rgb(24, 60, 126);
            }
            .inner-box:hover {
                background-color: #5fb6ec;
            }
            .center {
                text-align: center;
                color: rgb(0, 255, 0);
                font-size: 2.3rem;
            }
        </style>
    </head>
    <body>
        <div style="height: 1px; width: 1px;" class="parent"></div>
        <h1 class="center">쓸거면 쓰시오 Modern UI</h1>
        <div class="box" id="cardContainer"></div>

        <script>
            const container = document.getElementById('cardContainer');
            for (let i = 1; i <= 24; i++) {
                const div = document.createElement('div');
                div.className = 'inner-box';
                div.textContent = i;
                container.appendChild(div);
            }
        </script>
    </body>
</html>
