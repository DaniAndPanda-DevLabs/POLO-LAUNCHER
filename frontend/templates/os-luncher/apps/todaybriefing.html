<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Today Breifing</title>
  <link rel="stylesheet" href="style.css" />
  <style>
      :root {
  --bg: #0b1016;
  --card: rgba(255, 255, 255, 0.08);
  --card-strong: rgba(255, 255, 255, 0.13);
  --border: rgba(255, 255, 255, 0.12);
  --primary: #7cc7ff;
  --text: #ffffff;
  --sub: #b8c0cc;
  --ease: cubic-bezier(.22, .61, .36, 1);
  --radius-xl: 28px;
  --radius-lg: 22px;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  min-height: 100vh;
  margin: 0;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  overflow-x: hidden;
  overflow-y: auto;
  padding: 12px;
  background:
    radial-gradient(circle at 12% 0%, rgba(39,108,255,.22), transparent 28%),
    radial-gradient(circle at 100% 0%, rgba(107,44,255,.16), transparent 30%),
    var(--bg);
  color: var(--text);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.ambient { position: fixed; width: 42vw; height: 42vw; border-radius: 999px; filter: blur(70px); opacity: .38; pointer-events: none; }
.ambient-a { top: -14vw; right: 12vw; background: #276cff; animation: bloom 8s var(--ease) infinite alternate; }
.ambient-b { bottom: -18vw; left: 6vw; background: #6b2cff; animation: bloom 10s var(--ease) infinite alternate-reverse; }

.phone-shell {
  width: min(100%, 1280px);
  min-height: min(100vh - 24px, 820px);
  padding: 6px;
  display: flex;
  margin: 8px 0 20px;
}
.screen {
  position: relative;
  width: 100%;
  min-height: 0;
  padding: 14px 18px 18px;
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 30px;
  background: linear-gradient(145deg, rgba(255,255,255,.10), rgba(255,255,255,.03)), #0b1016;
  box-shadow: 0 24px 70px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.12);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.screen::before { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at 72% 12%, rgba(124,199,255,.22), transparent 26%), radial-gradient(circle at 20% 48%, rgba(255,255,255,.07), transparent 22%); pointer-events: none; }
.screen > * { position: relative; z-index: 1; }

.status-bar { height: 32px; display: flex; justify-content: space-between; align-items: center; padding: 0 8px; font-size: 14px; font-weight: 700; }
.status-icons { display: flex; align-items: center; gap: 9px; }
.network-icon { display: flex; gap: 2px; align-items: end; height: 14px; }
.network-icon i { width: 3px; border-radius: 4px; background: #fff; opacity: .92; }
.network-icon i:nth-child(1){height:5px}.network-icon i:nth-child(2){height:8px}.network-icon i:nth-child(3){height:11px}.network-icon i:nth-child(4){height:14px}
.wifi-icon { width: 18px; height: 14px; border: 3px solid #fff; border-color: #fff transparent transparent transparent; border-radius: 18px 18px 0 0; position: relative; transform: translateY(4px); }
.wifi-icon::after { content:""; position:absolute; left:5px; top:4px; width:4px; height:4px; background:#fff; border-radius:50%; }
.battery-icon { width: 25px; height: 13px; border: 1.8px solid #fff; border-radius: 4px; padding: 2px; position: relative; }
.battery-icon::after { content:""; position:absolute; right:-4px; top:3px; width:2px; height:5px; border-radius:2px; background:#fff; }
.battery-icon span { display:block; width:72%; height:100%; border-radius:2px; background:#fff; }

.hero { padding: 10px 2px 8px; }
.eyebrow, .card-label { margin: 0 0 6px; color: var(--primary); font-size: 13px; font-weight: 800; letter-spacing: .02em; }
h1 { margin: 0; font-size: clamp(30px, 3.8vw, 40px); line-height: .98; letter-spacing: -.055em; }
.hero-copy { margin: 6px 0 0; color: var(--sub); font-size: 13px; }

.glass-card { border: 1px solid var(--border); border-radius: var(--radius-xl); background: linear-gradient(145deg, rgba(255,255,255,.14), var(--card)); backdrop-filter: blur(28px) saturate(150%); box-shadow: 0 18px 45px rgba(0,0,0,.26), inset 0 1px 0 rgba(255,255,255,.14); transition: transform .55s var(--ease), box-shadow .55s var(--ease), background .55s var(--ease); }
.glass-card:hover { transform: translateY(-4px) scale(1.01); background: linear-gradient(145deg, rgba(255,255,255,.18), rgba(255,255,255,.09)); box-shadow: 0 24px 60px rgba(0,0,0,.34), 0 0 38px rgba(124,199,255,.11); }
.weather-card { min-height: 148px; padding: 16px 18px; display: flex; justify-content: space-between; align-items: center; overflow: hidden; }
.temperature { font-size: 66px; line-height: .86; font-weight: 800; letter-spacing: -.08em; }
.temperature small { font-size: 32px; vertical-align: top; margin-left: 4px; }
.weather-state, .high-low, .mini-card p, .fortune-card p { color: var(--sub); margin: 6px 0 0; }
.weather-orb { position: relative; width: 120px; height: 120px; filter: drop-shadow(0 0 30px rgba(124,199,255,.35)); }
.sun-core { position: absolute; inset: 15px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #fff6bc, #7cc7ff 58%, #3b72ff); animation: float 4s var(--ease) infinite alternate; }
.cloud { position: absolute; background: rgba(255,255,255,.82); border-radius: 999px; backdrop-filter: blur(8px); }
.cloud::before, .cloud::after { content:""; position:absolute; border-radius:50%; background:inherit; }
.cloud-one { width: 82px; height: 33px; bottom: 23px; left: 7px; }.cloud-one::before{width:38px;height:38px;left:12px;top:-20px}.cloud-one::after{width:28px;height:28px;right:13px;top:-13px}
.cloud-two { width: 68px; height: 27px; right: 0; bottom: 43px; opacity:.72 }.cloud-two::before{width:30px;height:30px;left:9px;top:-16px}.cloud-two::after{width:24px;height:24px;right:10px;top:-11px}
.section-title-row { display:flex; justify-content:space-between; align-items:end; margin: 10px 4px 6px; }
h2 { margin:0; font-size:18px; letter-spacing:-.03em; }.section-title-row span{color:var(--sub);font-size:12px}
.hourly-strip { display:flex; gap:8px; overflow-x:auto; padding: 2px 2px 6px; scroll-snap-type:x mandatory; scrollbar-width:none; }.hourly-strip::-webkit-scrollbar{display:none}
.hour-card { flex:0 0 72px; min-height:92px; padding:10px 8px; text-align:center; scroll-snap-align:start; border-radius:22px; }
.hour-card b { display:block; font-size:17px; margin-top:8px; }.hour-card span { color: var(--sub); font-size:12px; }
.tiny-icon { width:34px; height:34px; margin:8px auto 0; border-radius:50%; background: radial-gradient(circle at 35% 30%, #fff6bc, #7cc7ff 70%); box-shadow:0 0 18px rgba(124,199,255,.28); }
.info-grid { display:grid; grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr); gap: 10px; margin-top: 4px; }
.mini-card { min-height: 108px; padding: 13px; border-radius: var(--radius-lg); }
.metric { display:flex; align-items:baseline; justify-content:space-between; gap:10px; }.metric span, .mini-card h3 { margin:0; font-size:18px; letter-spacing:-.04em; }.metric b { font-size:26px; color:var(--primary); }
.action-row { display:grid; grid-template-columns: 118px 1fr; gap:10px; margin-top:8px; align-items:stretch; }
.update-button { position:relative; overflow:hidden; border:0; border-radius: var(--radius-lg); color:#06111b; background: linear-gradient(145deg, #bde7ff, var(--primary)); font-size:15px; font-weight:900; box-shadow: 0 14px 30px rgba(124,199,255,.24); cursor:pointer; transition: transform .45s var(--ease), filter .45s var(--ease); min-height: 100%; }
.update-button:active { transform: scale(.96); }.update-button::after { content:""; position:absolute; width:20px; height:20px; border-radius:50%; background:rgba(255,255,255,.55); inset:var(--y,50%) auto auto var(--x,50%); transform:translate(-50%,-50%) scale(0); opacity:0; }.update-button.ripple::after { animation:ripple .7s var(--ease); }
.fortune-card { min-height:100%; padding:13px; border-radius:var(--radius-lg); }
.home-indicator { width: 108px; height: 4px; border-radius: 99px; background: rgba(255,255,255,.78); margin: 8px auto 0; }
.reveal { animation: reveal .8s var(--ease) both; }.reveal:nth-of-type(2){animation-delay:.08s}.reveal:nth-of-type(3){animation-delay:.14s}.reveal:nth-of-type(4){animation-delay:.2s}
.updating { animation: pulse .55s var(--ease); }
@keyframes reveal { from { opacity:0; transform: translateY(18px) scale(.98); } to { opacity:1; transform:none; } }
@keyframes bloom { to { transform: scale(1.12) translate3d(2vw, -1vw, 0); opacity:.52; } }
@keyframes float { to { transform: translateY(-8px) scale(1.03); } }
@keyframes pulse { 50% { transform: scale(.985); filter: brightness(1.16); } }
@keyframes ripple { 0% { transform:translate(-50%,-50%) scale(0); opacity:.8; } 100% { transform:translate(-50%,-50%) scale(18); opacity:0; } }
@media (min-width: 760px) {
  .phone-shell { width:min(94vw, 1340px); height:min(90vh, 780px); }
  .screen { padding:12px 16px 16px; }
  .hero { padding-top:12px; }
  .weather-card { min-height:150px; padding:14px 16px; }
  .hour-card { flex-basis:76px; min-height:88px; }
}
@media (max-width: 380px) { .screen { border-radius:32px; padding-inline:14px; } .info-grid, .action-row { grid-template-columns:1fr; } .update-button { min-height:82px; } .temperature { font-size:72px; } .weather-orb { width:112px; height:112px; } }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration:.01ms !important; transition-duration:.01ms !important; scroll-behavior:auto !important; } }

  </style>
</head>
<body>
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>
  <main class="phone-shell" aria-label="Samsung One UI 7 weather dashboard">
    <section class="screen">
      <header class="status-bar" aria-label="status bar">
        <time id="statusTime">09:41</time>
      </header>

      <section class="hero reveal">
        <p class="eyebrow">Today Breifing</p>
        <h1 id="greeting">좋은 하루에요.</h1>
        <p class="hero-copy">차분한 밤공기와 함께 내일의 일정을 준비해요.</p>
      </section>

      <section class="weather-card glass-card reveal" id="weatherCard">
        <div>
          <p class="card-label">현재 날씨</p>
          <div class="temperature"><span id="currentTemp">23</span><small>°</small></div>
          <p class="weather-state" id="weatherState">맑고 선선함</p>
          <p class="high-low" id="highLow">최고 27° · 최저 19°</p>
        </div>
        <div class="weather-orb" id="weatherOrb" aria-label="weather icon">
          <span class="sun-core"></span>
          <span class="cloud cloud-one"></span>
          <span class="cloud cloud-two"></span>
        </div>
      </section>

      <section class="hourly-section reveal" aria-labelledby="hourlyTitle">
        <div class="section-title-row">
          <h2 id="hourlyTitle">시간별 날씨</h2>
          <span>부드러운 가로 스크롤</span>
        </div>
        <div class="hourly-strip" id="hourlyStrip" tabindex="0"></div>
      </section>

      <section class="info-grid">
        <article class="glass-card mini-card reveal" id="dustCard">
          <p class="card-label">미세먼지</p>
          <div class="metric"><span id="dustValue">좋음</span><b id="dustNumber">18</b></div>
          <p id="dustMessage">산책하기 좋은 공기예요.</p>
        </article>

        <article class="glass-card mini-card reveal" id="scheduleCard">
          <p class="card-label">오늘 일정</p>
          <h3 id="scheduleTitle">디자인 리뷰</h3>
          <p id="scheduleTime">오후 3:30 · One UI 카드 모션 점검</p>
        </article>
      </section>

      <section class="action-row reveal">
        <button class="update-button" id="updateButton" type="button"><span>Update</span></button>
        <article class="glass-card fortune-card" id="fortuneCard">
          <p class="card-label">오늘의 운세</p>
          <p id="fortuneText">작은 정리가 큰 영감을 가져오는 하루입니다.</p>
        </article>
      </section>

      <div class="home-indicator" aria-hidden="true"></div>
    </section>
  </main>
  <script src="app.js"></script>
  <script>
      const weatherSets = [
  { temp: 23, state: '맑고 선선함', high: 27, low: 19, dust: '좋음', dustNo: 18, dustMsg: '산책하기 좋은 공기예요.', schedule: '디자인 리뷰', time: '오후 3:30 · One UI 카드 모션 점검', fortune: '작은 정리가 큰 영감을 가져오는 하루입니다.' },
  { temp: 21, state: '구름 조금', high: 25, low: 18, dust: '보통', dustNo: 42, dustMsg: '창문을 잠깐 열어도 괜찮아요.', schedule: '팀 싱크', time: '오전 11:00 · 런처 QA 체크', fortune: '차분히 선택하면 좋은 기회가 가까워집니다.' },
  { temp: 26, state: '따뜻한 바람', high: 29, low: 22, dust: '매우 좋음', dustNo: 9, dustMsg: '공기가 깨끗하고 시야가 맑아요.', schedule: '프로토타입 공유', time: '오후 5:10 · 인터랙션 피드백', fortune: '미뤄둔 연락에서 반가운 소식이 옵니다.' },
  { temp: 19, state: '가벼운 비', high: 22, low: 17, dust: '좋음', dustNo: 21, dustMsg: '비가 먼지를 씻어내고 있어요.', schedule: '문서 정리', time: '오후 8:00 · 릴리즈 노트 작성', fortune: '속도를 낮추면 놓쳤던 디테일이 보입니다.' }
];

const hourlyTemplate = [
  ['지금', 23], ['10시', 24], ['11시', 25], ['12시', 26], ['13시', 27], ['14시', 27], ['15시', 26], ['16시', 25]
];

const $ = (selector) => document.querySelector(selector);
const hourlyStrip = $('#hourlyStrip');

function updateClock() {
  const now = new Date();
  $('#statusTime').textContent = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });
}

function renderHourly(offset = 0) {
  hourlyStrip.innerHTML = hourlyTemplate.map(([label, temp], index) => `
    <article class="glass-card hour-card" style="animation-delay:${index * 45}ms">
      <span>${label}</span>
      <div class="tiny-icon" aria-hidden="true"></div>
      <b>${temp + offset}°</b>
    </article>
  `).join('');
}

function applyWeather(data) {
  $('#currentTemp').textContent = data.temp;
  $('#weatherState').textContent = data.state;
  $('#highLow').textContent = `최고 ${data.high}° · 최저 ${data.low}°`;
  $('#dustValue').textContent = data.dust;
  $('#dustNumber').textContent = data.dustNo;
  $('#dustMessage').textContent = data.dustMsg;
  $('#scheduleTitle').textContent = data.schedule;
  $('#scheduleTime').textContent = data.time;
  $('#fortuneText').textContent = data.fortune;
  renderHourly(data.temp - 23);
}

function animateCards() {
  document.querySelectorAll('.glass-card').forEach((card, index) => {
    card.classList.remove('updating');
    window.setTimeout(() => card.classList.add('updating'), index * 38);
  });
}

function pickWeather() {
  const selected = weatherSets[Math.floor(Math.random() * weatherSets.length)];
  applyWeather(selected);
  animateCards();
}

$('#updateButton').addEventListener('click', (event) => {
  const button = event.currentTarget;
  const rect = button.getBoundingClientRect();
  button.style.setProperty('--x', `${event.clientX - rect.left}px`);
  button.style.setProperty('--y', `${event.clientY - rect.top}px`);
  button.classList.remove('ripple');
  void button.offsetWidth;
  button.classList.add('ripple');
  pickWeather();
});

updateClock();
renderHourly();
setInterval(updateClock, 1000);

function updateGreeting() {
  const hour = new Date().getHours();
  let greeting;

  if (hour >= 5 && hour < 11) {
    greeting = "좋은 아침이에요.";
  } else if (hour >= 11 && hour < 17) {
    greeting = "좋은 점심이에요.";
  } else if (hour >= 17 && hour < 22) {
    greeting = "좋은 저녁이에요.";
  } else {
    greeting = "좋은 새벽이에요.";
  }

  document.getElementById("greeting").textContent = greeting;
}

updateGreeting();
  </script>
</body>
</html>
