<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <style>
        body{
margin:0;
height:100vh;
}

/* 태스크바 */

#taskbar{
position:fixed;
bottom:0;
left:0;

width:100%;
height:50px;

background:#2563eb; /* 파란색 */

color:white;
display:flex;
align-items:center;
padding-left:10px;
padding-right:10px;
font-family:sans-serif;
gap:5px;
}

.taskbar-app{
width:45px;
height:45px;
background:rgba(255,255,255,0.2);
border:none;
border-radius:5px;
color:white;
font-size:20px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
transition:all 0.2s;
}

.taskbar-app:hover{
background:rgba(255,255,255,0.4);
transform:scale(1.1);
}

/* 파일 영역 */

#desktop-files{
padding:20px;
margin-bottom:60px;
}

#desktop{
    position:fixed;
    top:0;
    left:0;
    right:0;
    bottom:50px; /* taskbar 높이 */
    overflow:hidden;
}

.window{
    position:absolute;
    width:900px;
    height:600px;
    background:white;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.window-header{
    height:40px;
    background:#2563eb;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 10px;
    cursor:move;
}

.window-controls{
    display:flex;
    gap:5px;
}

.window-controls button{
    width:30px;
    height:30px;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

.window iframe{
    width:100%;
    height:calc(100% - 40px);
    border:none;
}

.minimized{
    display:none;
}

.maximized{
    top:0 !important;
    left:0 !important;
    width:100% !important;
    height:calc(100vh - 50px) !important;
}
    </style>
</head>

<body>
    <div id="desktop-files">Quick GOTOs(<-이거가 바로 바로가기 같은거임)</div>
    <div id="taskbar">
    <button class="taskbar-app" title="디데이">📅</button>
    <button class="taskbar-app" title="설정">⚙️</button>
    <button class="taskbar-app" title="타이머">⏱️</button>
    <button class="taskbar-app" title="주사위 던지기">🎲</button>
    <button class="taskbar-app" title="랜덤 선택">🎯</button>
    <button class="taskbar-app" title="돌림판">🎡</button>
    <button class="taskbar-app" title="점수판">🏆</button>
    <button class="taskbar-app" title="메모">📝</button>
    <button class="taskbar-app" title="소음 측정기">🔊</button>
    <button class="taskbar-app" title="QR 코드 생성기">📱</button>
    <button class="taskbar-app" title="실시간 시계">🕒</button>
    <button class="taskbar-app" title="체크리스트">✅</button>
    <button class="taskbar-app" title="ChatAI">🤖</button>
    </div>

    <div id="desktop"></div>

    <script>
        const app_links = {
            '디데이': './apps/d-day.html',
            '타이머': './apps/timer.html',
            '주사위 던지기': './apps/dice.html',
            '랜덤 선택': './apps/random.html',
            '돌림판': './apps/circlepan.html',
            '점수판': './apps/scoreboard.html',
            '메모': './apps/memo.html',
            '소음 측정기': './apps/noise-meter.html',
            'QR 코드 생성기': './apps/qrcodemaker.html',
            '실시간 시계': './apps/livetime.html',
            '체크리스트': './apps/checklist.html',
            'ChatAI': './apps/chatai.html',
            '설정': './apps/settings.html'
        };

        // 태스크바 앱 버튼 클릭 이벤트
    

        const desktop = document.getElementById("desktop");

let zIndexCounter = 100;

function createWindow(title, url){

    const win = document.createElement("div");
    win.className = "window";

    win.style.left = (100 + Math.random()*150) + "px";
    win.style.top = (50 + Math.random()*100) + "px";

    win.innerHTML = `
        <div class="window-header">
            <span>${title}</span>

            <div class="window-controls">
                <button class="min-btn">─</button>
                <button class="max-btn">□</button>
                <button class="close-btn">✕</button>
            </div>
        </div>

        <iframe src="${url}"></iframe>
    `;

    desktop.appendChild(win);

    // 맨 앞으로
    win.style.zIndex = ++zIndexCounter;

    win.addEventListener("mousedown",()=>{
        win.style.zIndex = ++zIndexCounter;
    });

    // 닫기
    win.querySelector(".close-btn").onclick = ()=>{
        win.remove();
    };

    // 최소화
    win.querySelector(".min-btn").onclick = ()=>{
        win.classList.toggle("minimized");
    };

    // 최대화
    win.querySelector(".max-btn").onclick = ()=>{
        win.classList.toggle("maximized");
    };

    // 드래그
    const header = win.querySelector(".window-header");

    let dragging = false;
    let offsetX = 0;
    let offsetY = 0;

    header.addEventListener("mousedown",(e)=>{

        if(win.classList.contains("maximized")) return;

        dragging = true;

        offsetX = e.clientX - win.offsetLeft;
        offsetY = e.clientY - win.offsetTop;
    });

    document.addEventListener("mousemove",(e)=>{

        if(!dragging) return;

        win.style.left = (e.clientX - offsetX) + "px";
        win.style.top = (e.clientY - offsetY) + "px";
    });

    document.addEventListener("mouseup",()=>{
        dragging = false;
    });
}

document.querySelectorAll('.taskbar-app').forEach(button => {

    button.addEventListener('click', () => {

        const appName = button.title;

        if(app_links[appName]){
            createWindow(
                appName,
                app_links[appName]
            );
        }

    });

});

    </script>
</body>

</html>
