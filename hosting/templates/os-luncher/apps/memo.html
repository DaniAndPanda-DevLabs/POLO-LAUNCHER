<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메모장</title>

<style>
:root{
    --bg:#edf2f7;
    --sidebar:#ffffff;
    --editor:#ffffff;
    --text:#1e293b;
    --sub:#64748b;
    --border:#e2e8f0;
    --hover:#f1f5f9;
    --accent:#4f46e5;
    --shadow:0 10px 30px rgba(0,0,0,.08);
}

body.dark{
    --bg:#0f172a;
    --sidebar:#162032;
    --editor:#1e293b;
    --text:#f8fafc;
    --sub:#94a3b8;
    --border:#334155;
    --hover:#263549;
    --accent:#818cf8;
    --shadow:0 10px 30px rgba(0,0,0,.35);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"맑은 고딕",sans-serif;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:var(--bg);
    transition:.25s;
}

.container{
    width:100%;
    height:100%;
    display:flex;
}

/* ===== 사이드바 ===== */

.sidebar{
    width:300px;
    background:var(--sidebar);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    box-shadow:var(--shadow);
    z-index:10;
}

.logo{
    padding:25px;
    font-size:35px;
    font-weight:700;
    color:var(--text);
}

.controls{
    padding:0 20px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

button{
    height:48px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    font-size:16px;
    transition:.2s;
    background:var(--hover);
    color:var(--text);
}

button:hover{
    transform:translateY(-2px);
}

.new-btn{
    background:var(--accent);
    color:white;
}

.page-list{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.page{
    padding:18px;
    border-radius:15px;
    margin-bottom:8px;
    cursor:pointer;
    transition:.2s;
    color:var(--text);
}

.page:hover{
    background:var(--hover);
}

.page.active{
    background:var(--accent);
    color:white;
}

.tip{
    padding:15px 20px;
    font-size:13px;
    color:var(--sub);
    border-top:1px solid var(--border);
}

/* ===== 에디터 ===== */

.editor{
    flex:1;
    background:var(--editor);
    padding:40px 60px;
    display:flex;
    flex-direction:column;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.save-status{
    color:var(--sub);
}

.title{
    border:none;
    outline:none;
    background:none;
    color:var(--text);
    font-size:54px;
    font-weight:700;
    margin-bottom:20px;
}

.content{
    flex:1;
    border:none;
    outline:none;
    resize:none;
    background:none;
    color:var(--text);
    font-size:22px;
    line-height:1.8;
}

.title::placeholder,
.content::placeholder{
    color:var(--sub);
}
</style>
</head>
<body>

<div class="container">

    <aside class="sidebar">

        <div class="logo">📝 메모장</div>

        <div class="controls">
            <button class="new-btn" onclick="addPage()">
                + 새 페이지
            </button>

            <button onclick="deletePage()">
                🗑 페이지 삭제
            </button>

            <button onclick="toggleTheme()">
                🌙 다크/라이트
            </button>
        </div>

        <div class="page-list" id="pageList"></div>

        <div class="tip">
            💡 페이지를 더블클릭하면 이름을 변경할 수 있습니다.
        </div>

    </aside>

    <main class="editor">

        <div class="topbar">
            <div></div>
            <button onclick="openPopup_hiclass()">
                하이클래스 알림장 작성 페이지로 이동하기 ->
            </button>
            <button onclick="openPopup_google()">
                구글 클래스룸으로 이동하기 ->
            </button>
            <div class="save-status" id="saveStatus">
                자동 저장됨
            </div>
        </div>

        <input
            id="title"
            class="title"
            placeholder="제목">

        <textarea
            id="content"
            class="content"
            placeholder="메모를 입력하세요..."></textarea>

    </main>

</div>

<script>
function openPopup_hiclass(){
    // 클립보드에 복사
    navigator.clipboard.writeText(document.getElementById("content").value);

    window.open(
        "https://www.hiclass.net/main/home",
        "eventPopup",
        "width=1200,height=750,left=100,top=100"
    );
}

function openPopup_google(){
    // 클립보드에 복사
    navigator.clipboard.writeText(document.getElementById("content").value);

    window.open(
        "https://classroom.google.com",
        "eventPopup",
        "width=1200,height=750,left=100,top=100"
    );
}

let pages =
JSON.parse(localStorage.getItem("memoPages")) || [
    {
        title:"페이지 1",
        content:""
    }
];

let current =
Number(localStorage.getItem("currentPage")) || 0;

const titleEl=document.getElementById("title");
const contentEl=document.getElementById("content");
const pageList=document.getElementById("pageList");
const saveStatus=document.getElementById("saveStatus");

/* 다크모드 복원 */

if(localStorage.getItem("theme")==="dark"){
    document.body.classList.add("dark");
}

/* 저장 */

function saveAll(){

    localStorage.setItem(
        "memoPages",
        JSON.stringify(pages)
    );

    localStorage.setItem(
        "currentPage",
        current
    );

    saveStatus.textContent="저장됨 ✓";

    clearTimeout(window.saveTimer);

    window.saveTimer=setTimeout(()=>{
        saveStatus.textContent="자동 저장됨";
    },1200);
}

/* 페이지 목록 */

function renderPages(){

    pageList.innerHTML="";

    pages.forEach((page,index)=>{

        const div=document.createElement("div");

        div.className=
            "page" +
            (index===current ? " active":"");

        div.textContent=
            page.title || `페이지 ${index+1}`;

        /* 페이지 열기 */
        div.onclick=()=>{
            current=index;
            loadPage();
        };

        /* 더블클릭 시 이름 변경 */
        div.ondblclick=(e)=>{

            e.stopPropagation();

            const newName=prompt(
                "새 페이지 이름",
                page.title
            );

            if(newName===null) return;

            const name=newName.trim();

            if(name!==""){
                pages[index].title=name;
                renderPages();
                saveAll();
            }
        };

        pageList.appendChild(div);

    });

}

/* 페이지 불러오기 */

function loadPage(){

    if(!pages[current]) return;

    titleEl.value=pages[current].title;
    contentEl.value=pages[current].content;

    renderPages();
    saveAll();
}

/* 제목 변경 */

titleEl.addEventListener("input",()=>{

    pages[current].title=
        titleEl.value || "제목 없음";

    renderPages();
    saveAll();
});

/* 내용 자동 저장 */

contentEl.addEventListener("input",()=>{

    pages[current].content=
        contentEl.value;

    saveAll();
});

/* 새 페이지 */

function addPage(){

    pages.push({
        title:`페이지 ${pages.length+1}`,
        content:""
    });

    current=pages.length-1;

    loadPage();
}

/* 삭제 */

function deletePage(){

    if(pages.length===1){
        alert("최소 1개의 페이지는 필요합니다.");
        return;
    }

    if(!confirm("현재 페이지를 삭제할까요?"))
        return;

    pages.splice(current,1);

    if(current>=pages.length)
        current=pages.length-1;

    loadPage();
}

/* 다크모드 */

function toggleTheme(){

    document.body.classList.toggle("dark");

    localStorage.setItem(
        "theme",
        document.body.classList.contains("dark")
            ? "dark"
            : "light"
    );
}

/* 시작 */

loadPage();

</script>

</body>
</html>
