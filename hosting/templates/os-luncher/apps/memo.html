<div class="memo-app">

    <h2>📝 메모장</h2>

    <textarea
        id="memoInput"
        placeholder="메모를 입력하세요..."
    ></textarea>

    <button onclick="saveMemo()">
        저장
    </button>

    <div class="memo-list-title">
        저장된 메모
    </div>

    <div id="memoList"></div>

</div>

<style>
.memo-app{
    width:min(700px,95vw);
    margin:20px auto;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
}

#memoInput{
    width:100%;
    height:180px;
    resize:vertical;
    padding:15px;
    box-sizing:border-box;
    border:none;
    border-radius:12px;
    font-size:16px;
}

.memo-app button{
    margin-top:10px;
    padding:10px 20px;
    cursor:pointer;
}

.memo-list-title{
    margin-top:20px;
    font-weight:bold;
    font-size:20px;
}

.memo-item{
    margin-top:10px;
    padding:12px;
    border-radius:10px;
    background:rgba(255,255,255,.12);
}

.memo-time{
    font-size:12px;
    opacity:.7;
    margin-bottom:6px;
}

.memo-actions{
    margin-top:10px;
}

.memo-actions button{
    margin-right:5px;
}
</style>

<script>
const STORAGE_KEY = "memo_app_v1";

function getMemos(){
    return JSON.parse(
        localStorage.getItem(STORAGE_KEY) || "[]"
    );
}

function setMemos(memos){
    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(memos)
    );
}

function renderMemos(){

    const memos = getMemos();

    const list =
        document.getElementById("memoList");

    list.innerHTML = "";

    memos.reverse().forEach((memo,index)=>{

        const realIndex =
            memos.length - 1 - index;

        const div =
            document.createElement("div");

        div.className = "memo-item";

        div.innerHTML = `
            <div class="memo-time">
                ${memo.time}
            </div>

            <div>
                ${memo.text
                    .replace(/</g,"&lt;")
                    .replace(/\n/g,"<br>")}
            </div>

            <div class="memo-actions">
                <button onclick="deleteMemo(${realIndex})">
                    삭제
                </button>
            </div>
        `;

        list.appendChild(div);

    });
}

function saveMemo(){

    const input =
        document.getElementById("memoInput");

    const text = input.value.trim();

    if(!text) return;

    const memos = getMemos();

    memos.push({
        text,
        time:new Date().toLocaleString()
    });

    setMemos(memos);

    input.value = "";

    renderMemos();
}

function deleteMemo(index){

    const memos = getMemos();

    memos.splice(index,1);

    setMemos(memos);

    renderMemos();
}

let autoSaveTimer;

document
.getElementById("memoInput")
.addEventListener("input",()=>{

    clearTimeout(autoSaveTimer);

    autoSaveTimer = setTimeout(()=>{

        const text =
            document
            .getElementById("memoInput")
            .value
            .trim();

        if(text){
            saveMemo();
        }

    },20000);

});

renderMemos();
</script>
