<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>돌림판</title>
<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}
h1{
    margin-bottom:10px;
}
#wheel-container{
    position:relative;
    width:500px;
    margin:auto;
}
#pointer{
    position:absolute;
    left:50%;
    top:-10px;
    transform:translateX(-50%);
    width:0;
    height:0;
    border-left:20px solid transparent;
    border-right:20px solid transparent;
    border-top:40px solid red;
    z-index:10;
}
canvas{
    background:white;
    border-radius:50%;
    box-shadow:0 0 10px rgba(0,0,0,.3);
}
textarea{
    width:500px;
    height:120px;
    margin-top:20px;
}
button{
    padding:10px 20px;
    font-size:16px;
    margin:10px;
    cursor:pointer;
}
#result{
    font-size:24px;
    font-weight:bold;
    margin-top:15px;
}
</style>
</head>
<body>

<h1>돌림판</h1>

<div id="wheel-container">
    <div id="pointer"></div>
    <canvas id="wheel" width="500" height="500"></canvas>
</div>

<div>
<textarea id="items">치킨
피자
햄버거
떡볶이
라면
초밥</textarea>
<br>
<button onclick="spin()">돌리기</button>
</div>

<div id="result"></div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let items = ["치킨","피자","햄버거","떡볶이","라면","초밥"];
let rotation = 0;
let spinning = false;

function drawWheel(){
    const radius = 250;
    const angle = (Math.PI * 2) / items.length;

    ctx.clearRect(0,0,500,500);

    items.forEach((item,i)=>{
        const start = i * angle + rotation;
        const end = start + angle;

        ctx.beginPath();
        ctx.moveTo(250,250);
        ctx.arc(250,250,radius,start,end);
        ctx.closePath();

        ctx.fillStyle = `hsl(${i*360/items.length},80%,65%)`;
        ctx.fill();

        ctx.save();
        ctx.translate(250,250);
        ctx.rotate(start + angle/2);

        ctx.fillStyle = "#000";
        ctx.font = "20px Arial";
        ctx.textAlign = "right";
        ctx.fillText(item, radius-20, 8);

        ctx.restore();
    });
}

function updateWheel(){
    items = document.getElementById("items").value
        .split("\n")
        .map(v=>v.trim())
        .filter(v=>v);

    if(items.length < 2){
        alert("항목을 2개 이상 입력하세요.");
        return;
    }

    drawWheel();
}

function spin(){
    if(spinning) return;

    spinning = true;

    const extra = Math.random()*Math.PI*2;
    const target = rotation + (Math.PI*12) + extra;

    const start = performance.now();
    const duration = 5000;

    function animate(now){
        let t = (now-start)/duration;
        if(t>1) t=1;

        const ease = 1-Math.pow(1-t,3);
        rotation = rotation + (target-rotation)*ease;

        drawWheel();

        if(t<1){
            requestAnimationFrame(animate);
        }else{
            rotation = target % (Math.PI*2);
            drawWheel();

            const anglePer = (Math.PI*2)/items.length;
            let pointerAngle = (Math.PI*1.5 - rotation + Math.PI*2)%(Math.PI*2);

            let index = Math.floor(pointerAngle/anglePer)%items.length;

            document.getElementById("result").textContent =
                "🎉 결과: " + items[index];

            spinning = false;
        }
    }

    requestAnimationFrame(animate);
}

drawWheel();

document.getElementById("items").addEventListener("input", () => {
    const newItems = document.getElementById("items").value
        .split("\n")
        .map(v => v.trim())
        .filter(v => v);

    if (newItems.length >= 2) {
        items = newItems;
        drawWheel();
    }
});
</script>

</body>
</html>
