<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Image Viewer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.player{
    width:900px;
    padding:25px;
    border-radius:25px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    box-shadow:0 15px 40px rgba(0,0,0,.6);
}

.viewer{
    height:520px;
    background:rgba(255,255,255,.05);
    border-radius:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    margin-bottom:20px;
    animation:glow 3s infinite alternate;
}

@keyframes glow{
    from{
        box-shadow:0 0 15px #00f5ff;
    }
    to{
        box-shadow:0 0 35px #ff00c8;
    }
}

img{
    max-width:100%;
    max-height:100%;
    transition:transform .15s linear;
    transform-origin:center center;
    user-select:none;
    pointer-events:none;
}

.controls{
    text-align:center;
    margin-bottom:15px;
}

button{
    width:55px;
    height:55px;
    margin:5px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    color:white;
    font-size:22px;
    background:linear-gradient(135deg,#00f5ff,#ff00c8);
    box-shadow:0 0 15px rgba(0,245,255,.6);
    transition:.25s;
}

button:hover{
    transform:scale(1.15);
    box-shadow:0 0 25px rgba(255,0,200,.8);
}

input[type=file]{
    color:white;
}

#filename{
    margin-top:15px;
    color:white;
    text-align:center;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="player">

<div class="viewer">
<img id="image">
</div>

<div class="controls">
<button id="zoomIn">＋</button>
<button id="zoomOut">－</button>
<button id="reset">⟳</button>
</div>

<input
type="file"
id="file"
accept="image/png,image/jpeg,image/jpg,image/gif,image/webp,image/bmp,image/svg+xml">

<div id="filename">
파일을 선택하세요
</div>

</div>

<script>

const file=document.getElementById("file");
const image=document.getElementById("image");
const filename=document.getElementById("filename");

let scale=1;

file.onchange=e=>{

const f=e.target.files[0];
if(!f) return;

filename.textContent=f.name;

image.src=URL.createObjectURL(f);

scale=1;
update();

};

function update(){

image.style.transform=`scale(${scale})`;

}

zoomIn.onclick=()=>{

scale+=0.1;

update();

};

zoomOut.onclick=()=>{

scale=Math.max(0.1,scale-0.1);

update();

};

reset.onclick=()=>{

scale=1;

update();

};

document.querySelector(".viewer").addEventListener("wheel",e=>{

e.preventDefault();

if(e.deltaY<0){

scale+=0.1;

}else{

scale=Math.max(0.1,scale-0.1);

}

update();

},{passive:false});

</script>

</body>
</html>
