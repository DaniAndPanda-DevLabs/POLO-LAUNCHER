<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D-Day 계산기</title>
<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin:40px;
}
input{
    padding:10px;
    font-size:18px;
}
#result{
    margin-top:20px;
    font-size:32px;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>📅 D-Day 계산기</h1>

<input type="date" id="targetDate">

<div id="result">
날짜를 선택하세요
</div>

<script>
const dateInput = document.getElementById("targetDate");
const result = document.getElementById("result");

function updateDday() {
    if (!dateInput.value) {
        result.textContent = "날짜를 선택하세요";
        return;
    }

    const today = new Date();
    const target = new Date(dateInput.value);

    today.setHours(0,0,0,0);
    target.setHours(0,0,0,0);

    const diff = target - today;
    const days = Math.ceil(diff / (1000 * 60 * 60 * 24));

    if (days > 0) {
        result.textContent = `D-${days}`;
    } else if (days === 0) {
        result.textContent = "D-Day 🎉";
    } else {
        result.textContent = `D+${Math.abs(days)}`;
    }
}

dateInput.addEventListener("input", updateDday);
</script>

</body>
</html>
