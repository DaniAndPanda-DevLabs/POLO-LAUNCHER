<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoloLauncher 업데이트 로그</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --primary-color: #3b82f6;
            --accent-new: #10b981;
            --accent-fix: #f59e0b;
            --accent-remove: #ef4444;
            --border-color: #2d2d34;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
        }

        h1 {
            color: #fff;
            margin: 0 0 10px 0;
            font-size: 2.5rem;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            margin: 0;
        }

        .version-block {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s;
        }

        .version-block:hover {
            transform: translateY(-2px);
        }

        .version-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .version-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .version-tag {
            background-color: var(--primary-color);
            color: white;
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .version-date {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .log-section {
            margin-bottom: 15px;
        }

        .log-section h4 {
            margin: 10px 0;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 4px;
            color: #fff;
            font-weight: bold;
        }

        .badge.new { background-color: var(--accent-new); }
        .badge.fix { background-color: var(--accent-fix); }
        .badge.remove { background-color: var(--accent-remove); }

        ul {
            margin: 0;
            padding-left: 20px;
            color: var(--text-color);
        }

        li {
            margin-bottom: 8px;
        }

        li code {
            background-color: #2d2d34;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Consolas', monospace;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>PoloLauncher</h1>
            <p class="subtitle">업데이트 및 변경 로그</p>
        </header>
        <div class="version-block">
            <div class="version-header">
                <h3 class="version-title">v0.1</h3>
                <span class="version-date">2026년 6월 23일</span>
            </div>
            
            <div class="log-section">
                <h4><span class="badge new">NEW</span> 최초 릴리즈</h4>
                <ul>
                    <li><b>PoloLauncher</b> 베타 출시</li>
                    <li><u><b>오류 많음</b></u></li>
                </ul>
            </div>
        </div>

    </div>

</body>
</html>
