<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#f8fafc;
    --muted:#94a3b8;
    --accent:#3b82f6;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    min-height:100vh;
    display:grid;
    place-items:center;
    background:linear-gradient(135deg,#020617,#0f172a);
    font-family:"Pretendard",system-ui,sans-serif;
    color:var(--text);
}

.timer{
    width:min(500px,90vw);
    background:rgba(30,41,59,.9);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:32px;
    box-shadow:0 20px 50px rgba(0,0,0,.35);
}

h1{
    text-align:center;
    margin-bottom:24px;
    font-size:1.8rem;
}

.inputs{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
}

.input-box{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.input-box label{
    color:var(--muted);
    font-size:.9rem;
}

.input-box input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#334155;
    color:white;
    text-align:center;
    font-size:1.2rem;
}

.display{
    text-align:center;
    font-size:4rem;
    font-weight:700;
    letter-spacing:2px;
    margin:28px 0;
}

meter{
    width:100%;
    height:24px;
}

meter::-webkit-meter-bar{
    background:#334155;
    border-radius:999px;
}

meter::-webkit-meter-optimum-value{
    background:linear-gradient(90deg,#22c55e,#3b82f6);
    border-radius:999px;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:24px;
}

button{
    flex:1;
    border:none;
    border-radius:14px;
    padding:14px;
    cursor:pointer;
    color:white;
    font-size:1rem;
    font-weight:600;
    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
}

.start{
    background:#2563eb;
}

.pause{
    background:#f59e0b;
}

.reset{
    background:#ef4444;
}
</style>
</head>
<body>

<div class="timer">
    <h1>⏱ Timer</h1>

    <div class="inputs">
        <div class="input-box">
            <label>시</label>
            <input id="hours" type="number" min="0" value="0">
        </div>

        <div class="input-box">
            <label>분</label>
            <input id="minutes" type="number" min="0" max="59" value="5">
        </div>

        <div class="input-box">
            <label>초</label>
            <input id="seconds" type="number" min="0" max="59" value="0">
        </div>
    </div>

    <div class="display" id="display">00:05:00</div>

    <meter id="progress" min="0" max="300" value="300"></meter>

    <div class="buttons">
        <button class="start" id="startBtn">시작</button>
        <button class="pause" id="pauseBtn">일시정지</button>
        <button class="reset" id="resetBtn">초기화</button>
    </div>
</div>

<script>
const hInput = document.getElementById("hours");
const mInput = document.getElementById("minutes");
const sInput = document.getElementById("seconds");

const display = document.getElementById("display");
const meter = document.getElementById("progress");

let totalSeconds = 0;
let remainingSeconds = 0;
let timer = null;

function getInputSeconds(){
    return (
        Number(hInput.value || 0) * 3600 +
        Number(mInput.value || 0) * 60 +
        Number(sInput.value || 0)
    );
}

function format(sec){
    const h = String(Math.floor(sec / 3600)).padStart(2,"0");
    const m = String(Math.floor((sec % 3600) / 60)).padStart(2,"0");
    const s = String(sec % 60).padStart(2,"0");
    return `${h}:${m}:${s}`;
}

function updateUI(){
    display.textContent = format(remainingSeconds);
    meter.value = remainingSeconds;
}

function initialize(){
    totalSeconds = getInputSeconds();
    remainingSeconds = totalSeconds;

    meter.max = totalSeconds || 1;
    updateUI();
}

function start(){
    if(timer || remainingSeconds <= 0) return;

    timer = setInterval(() => {
        remainingSeconds--;

        if(remainingSeconds <= 0){
            remainingSeconds = 0;
            updateUI();

            clearInterval(timer);
            timer = null;

            alert("⏰ 시간 종료!");
            return;
        }

        updateUI();
    },1000);
}

function pause(){
    clearInterval(timer);
    timer = null;
}

function reset(){
    pause();
    initialize();
}

document.getElementById("startBtn").onclick = start;
document.getElementById("pauseBtn").onclick = pause;
document.getElementById("resetBtn").onclick = reset;

[hInput,mInput,sInput].forEach(input=>{
    input.addEventListener("change", reset);
});

initialize();
</script>

</body>
</html>
